name: Deploy Web to Vercel

# Configures the git-connected Vercel project, then runs a REMOTE build via the
# Vercel CLI from the repo root. The CLI streams the remote build logs to this
# Action's output (so failures are visible here), while Vercel builds apps/web
# using the project's Root Directory + scoped install settings.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_znAIKWJrPrUVqKc4NSoOhXc7
      VERCEL_PROJECT_ID: prj_CoXKjuMqq0QCeqhqtc6POqntYTsK
      TEAM: team_znAIKWJrPrUVqKc4NSoOhXc7
      PROJECT: prj_CoXKjuMqq0QCeqhqtc6POqntYTsK
      SUPABASE_URL: https://wslvotaodwdftmexkfpd.supabase.co
      SUPABASE_ANON: sb_publishable_qUhviGOdAK1aNXzukWO13g_tJ1mV6a5
    steps:
      - uses: actions/checkout@v4
      - name: Guard — require VERCEL_TOKEN
        run: '[ -n "$VERCEL_TOKEN" ] || { echo "::error::Add VERCEL_TOKEN secret"; exit 1; }'

      - name: Configure project (root dir, framework, scoped install, node 20)
        run: |
          curl -fsS -X PATCH "https://api.vercel.com/v9/projects/$PROJECT?teamId=$TEAM" \
            -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/web","framework":"nextjs","nodeVersion":"20.x","installCommand":"cd ../.. && pnpm install --no-frozen-lockfile --filter @elite/web...","buildCommand":"next build"}' | head -c 400
          echo

      - name: Upsert Supabase env vars
        run: |
          for pair in "NEXT_PUBLIC_SUPABASE_URL:$SUPABASE_URL" "NEXT_PUBLIC_SUPABASE_ANON_KEY:$SUPABASE_ANON"; do
            key="${pair%%:*}"; val="${pair#*:}"
            curl -sS -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true&teamId=$TEAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              -d "{\"key\":\"$key\",\"value\":\"$val\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" >/dev/null || true
          done

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy (remote build, streamed logs)
        run: |
          set -o pipefail
          vercel deploy --prod --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/deploy.log
