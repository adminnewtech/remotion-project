name: Deploy Web to Vercel

# Configures the git-connected Vercel project via the Vercel API (Root Directory,
# framework, an install command scoped to ONLY the web app + its workspace deps,
# and Node 20), then triggers a REMOTE build+deploy from the latest master commit.
# Scoping install avoids pulling Expo/React-Native + Remotion deps that break the build.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM: team_znAIKWJrPrUVqKc4NSoOhXc7
      PROJECT: prj_CoXKjuMqq0QCeqhqtc6POqntYTsK
      REPO_ID: "1188629431"
      SUPABASE_URL: https://wslvotaodwdftmexkfpd.supabase.co
      SUPABASE_ANON: sb_publishable_qUhviGOdAK1aNXzukWO13g_tJ1mV6a5
    steps:
      - name: Guard — require VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::Add VERCEL_TOKEN secret"; exit 1; fi

      - name: Configure project (root dir, framework, scoped install, node 20)
        run: |
          curl -fsS -X PATCH "https://api.vercel.com/v9/projects/$PROJECT?teamId=$TEAM" \
            -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/web","framework":"nextjs","nodeVersion":"20.x","installCommand":"cd ../.. && pnpm install --filter @elite/web...","buildCommand":"next build"}' | head -c 500
          echo

      - name: Upsert Supabase env vars
        run: |
          for pair in "NEXT_PUBLIC_SUPABASE_URL:$SUPABASE_URL" "NEXT_PUBLIC_SUPABASE_ANON_KEY:$SUPABASE_ANON"; do
            key="${pair%%:*}"; val="${pair#*:}"
            curl -sS -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true&teamId=$TEAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              -d "{\"key\":\"$key\",\"value\":\"$val\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" >/dev/null || true
          done
          echo "env upserted"

      - name: Trigger production deployment (remote build from master)
        run: |
          RESP=$(curl -fsS -X POST "https://api.vercel.com/v13/deployments?teamId=$TEAM&forceNew=1&skipAutoDetectionConfirmation=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
            -d "{\"name\":\"remotion-project-6dvr\",\"project\":\"$PROJECT\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":\"$REPO_ID\",\"ref\":\"master\"}}")
          echo "$RESP" | head -c 600
          URL=$(echo "$RESP" | jq -r '.url // empty')
          echo "### 🚀 Vercel deployment triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "https://$URL" >> "$GITHUB_STEP_SUMMARY"
