name: Configure Vercel projects

# One-shot maintenance workflow. Sets the Root Directory (and build settings)
# of BOTH Vercel projects connected to this repo to `apps/web`, so neither one
# tries to deploy the bare monorepo root.
#
# Why a workflow (and not a repo-root vercel.json): Vercel reads a repo-root
# vercel.json for EVERY connected project — including the one whose Root
# Directory is already apps/web — which breaks that working deploy. Root
# Directory is a per-project setting, so it must be set via the API.
#
# Run manually from the Actions tab (workflow_dispatch). Requires the
# VERCEL_TOKEN repo secret.

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM: team_znAIKWJrPrUVqKc4NSoOhXc7
      SUPABASE_URL: https://wslvotaodwdftmexkfpd.supabase.co
      SUPABASE_ANON: sb_publishable_qUhviGOdAK1aNXzukWO13g_tJ1mV6a5
    steps:
      - name: Guard — require VERCEL_TOKEN
        run: '[ -n "$VERCEL_TOKEN" ] || { echo "::error::Add VERCEL_TOKEN secret"; exit 1; }'

      - name: Point both projects at apps/web
        run: |
          # prj_CoXKjuMqq0QCeqhqtc6POqntYTsK = remotion-project-6dvr (already apps/web)
          # prj_NkDqTDAjhcc8gU13EFP7ioMiwazI = remotion-project (legacy, repo root)
          for PROJECT in prj_CoXKjuMqq0QCeqhqtc6POqntYTsK prj_NkDqTDAjhcc8gU13EFP7ioMiwazI; do
            echo "Configuring $PROJECT…"
            curl -fsS -X PATCH "https://api.vercel.com/v9/projects/$PROJECT?teamId=$TEAM" \
              -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
              -d '{"rootDirectory":"apps/web","framework":"nextjs","nodeVersion":"20.x","installCommand":"cd ../.. && pnpm install --no-frozen-lockfile --filter @elite/web...","buildCommand":"next build"}' | head -c 300
            echo
            for pair in "NEXT_PUBLIC_SUPABASE_URL:$SUPABASE_URL" "NEXT_PUBLIC_SUPABASE_ANON_KEY:$SUPABASE_ANON"; do
              key="${pair%%:*}"; val="${pair#*:}"
              curl -sS -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true&teamId=$TEAM" \
                -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" \
                -d "{\"key\":\"$key\",\"value\":\"$val\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" >/dev/null || true
            done
          done
          echo "Done. Re-deploy the PR (or push) to pick up the new Root Directory."
